name: selftest

on:
  push:
    branches: [main]
  pull_request:

jobs:
  replay:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.9", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: replay raw engine logs against committed verdicts
        run: python3 picchio.py --selftest
